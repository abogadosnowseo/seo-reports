services:
  - type: web
    name: seo-dashboard
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_MODE
        value: mock
      - key: AHREFS_API_KEY
        sync: false
      - key: GA4_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CALLRAIL_API_KEY
        sync: false
      - key: CALLRAIL_ACCOUNT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
    healthCheckPath: /
